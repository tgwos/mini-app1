<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Gas Cloud</title>

<script src="https://telegram.org/js/telegram-web-app.js?v=6"></script>

<style>

:root{

--bg:#0e0e11;
--card:#151518;
--border:#ff1a1a;
--text:#ffffff;
--sub:#9b9ba1;

--radius:22px;

}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif;
}

.container{
padding:20px 16px 140px;
display:flex;
flex-direction:column;
align-items:center;
gap:26px;
max-width:430px;
margin:auto;
}

/* LOGO */

.header-logo{
display:flex;
justify-content:center;
}

.header-logo img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
box-shadow:0 6px 30px rgba(0,0,0,.6);
}

/* LED BORDER ANIMATION */

@keyframes ledBorder {

0%{
background-position:0% 50%;
}

100%{
background-position:300% 50%;
}

}

/* PREVIEW */

.preview-box{
width:100%;
overflow:hidden;
}

.preview-slider{
display:flex;
gap:14px;
overflow:hidden;
}

.preview-slider::-webkit-scrollbar{
display:none;
}

.preview-card{

min-width:150px;
height:150px;

border-radius:20px;

overflow:hidden;

border:2px solid transparent;

background:
linear-gradient(var(--card),var(--card)) padding-box,
linear-gradient(
90deg,
transparent,
#ff1a1a,
#ff4d4d,
#ff1a1a,
transparent
) border-box;

background-size:300% 100%;

animation:ledBorder 4s linear infinite;

box-shadow:
0 0 12px rgba(255,0,0,.3);

pointer-events:none;

}

.preview-card img{
width:100%;
height:100%;
object-fit:cover;
}

/* PANEL */

.panel{

width:100%;

border-radius:var(--radius);

padding:20px;

border:2px solid transparent;

background:
linear-gradient(var(--card),var(--card)) padding-box,
linear-gradient(
90deg,
transparent,
#ff1a1a,
#ff4d4d,
#ff1a1a,
transparent
) border-box;

background-size:300% 100%;

animation:ledBorder 5s linear infinite;

box-shadow:
0 0 14px rgba(255,0,0,.35);

}

/* GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

/* CARD CATALOGO */

.card-catalog{

grid-column:1/-1;

height:120px;

border-radius:var(--radius);

display:flex;
align-items:center;

gap:18px;

padding:0 22px;

cursor:pointer;

border:2px solid transparent;

background:
linear-gradient(var(--card),var(--card)) padding-box,
linear-gradient(
90deg,
transparent,
#ff1a1a,
#ff4d4d,
#ff1a1a,
transparent
) border-box;

background-size:300% 100%;

animation:ledBorder 4s linear infinite;

box-shadow:
0 0 14px rgba(255,0,0,.4);

}

.card-catalog img{
width:70px;
height:70px;
border-radius:50%;
}

.card-catalog span{
flex:1;
font-size:18px;
font-weight:700;
}

/* SMALL CARDS */

.card-small{

height:120px;

border-radius:var(--radius);

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

gap:10px;

cursor:pointer;

border:2px solid transparent;

background:
linear-gradient(var(--card),var(--card)) padding-box,
linear-gradient(
90deg,
transparent,
#ff1a1a,
#ff4d4d,
#ff1a1a,
transparent
) border-box;

background-size:300% 100%;

animation:ledBorder 4s linear infinite;

box-shadow:
0 0 14px rgba(255,0,0,.35);

}

.card-small img{
width:52px;
height:52px;
border-radius:50%;
}

.card-small span{
font-size:12px;
color:var(--sub);
}

/* POPUP */

.popup-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:.25s;
}

.popup-overlay.show{
opacity:1;
pointer-events:auto;
}

.popup-box{

padding:24px;

border-radius:20px;

text-align:center;

border:2px solid transparent;

background:
linear-gradient(var(--card),var(--card)) padding-box,
linear-gradient(
90deg,
transparent,
#ff1a1a,
#ff4d4d,
#ff1a1a,
transparent
) border-box;

background-size:300% 100%;

animation:ledBorder 4s linear infinite;

box-shadow:
0 0 20px rgba(255,0,0,.4);

}

.popup-title{
font-size:16px;
font-weight:700;
margin-bottom:12px;
}

.popup-username{
display:block;
padding:12px;
margin-top:8px;
border-radius:14px;
background:#1c1c20;
color:white;
text-decoration:none;
}

/* BOTTOM BAR */

.bottom-bar{

position:fixed;

bottom:14px;
left:14px;
right:14px;

height:72px;

display:flex;

justify-content:space-around;
align-items:center;

border-radius:26px;

border:2px solid transparent;

background:
linear-gradient(var(--card),var(--card)) padding-box,
linear-gradient(
90deg,
transparent,
#ff1a1a,
#ff4d4d,
#ff1a1a,
transparent
) border-box;

background-size:300% 100%;

animation:ledBorder 6s linear infinite;

}

.bottom-bar a{

display:flex;

flex-direction:column;

align-items:center;

gap:4px;

font-size:11px;

font-weight:600;

color:#ff1a1a;

text-decoration:none;

transition:.2s;

}

/* icone rosse */

.bottom-bar svg{

width:24px;
height:24px;

fill:#ff1a1a;
stroke:#ff1a1a;

}

/* effetto pressione */

.bottom-bar a:active{

transform:scale(.9);

}

.bottom-bar svg{
width:22px;
height:22px;
fill:currentColor;
}

/* FLOAT BUTTON */

.createby-fab{

position:fixed;

right:18px;

width:60px;
height:60px;

border-radius:50%;

display:flex;

align-items:center;
justify-content:center;

border:2px solid transparent;

background:
linear-gradient(var(--card),var(--card)) padding-box,
linear-gradient(
90deg,
transparent,
#ff1a1a,
#ff4d4d,
#ff1a1a,
transparent
) border-box;

background-size:300% 100%;

animation:ledBorder 4s linear infinite;

box-shadow:
0 0 20px rgba(255,0,0,.45);

}

.createby-fab img{
width:42px;
height:42px;
border-radius:50%;
}

.createby-tooltip{

position:absolute;

right:74px;

top:50%;

transform:translateY(-50%);

background:var(--card);

border:1px solid #ff1a1a;

padding:10px 14px;

border-radius:14px;

font-size:11px;

white-space:nowrap;

}

</style>
</head>

<body>

<div id="popup" class="popup-overlay" onclick="closePopup()">

<script>

<script>

const popup = document.getElementById("popup");
const popupTitle = document.getElementById("popup-title");
const popupTelegram = document.getElementById("popup-link-telegram");
const popupSignal = document.getElementById("popup-link-signal");

function openPopup(title,tgText,tgUrl,signalText,signalUrl){

popupTitle.innerText = title;

popupTelegram.innerText = tgText;
popupTelegram.onclick = ()=>tg.openLink(tgUrl);
popupTelegram.style.display="block";

if(signalText && signalUrl){
popupSignal.innerText = signalText;
popupSignal.onclick = ()=>tg.openLink(signalUrl);
popupSignal.style.display="block";
}else{
popupSignal.style.display="none";
}

popup.classList.add("show");

}

function closePopup(){
popup.classList.remove("show");
}

</script>

<script>

let productsData = [];

async function loadProducts(){

const res = await fetch("products.json");
productsData = await res.json();

const slider = document.getElementById("preview-slider");

productsData.forEach(product => {

const card = document.createElement("div");
card.className = "preview-card";

card.innerHTML = `
<img src="${product.previewImage}">
`;

slider.appendChild(card);

});

duplicateSlider();
startSlider();

}

function duplicateSlider(){

const slider = document.getElementById("preview-slider");

const cards = [...slider.children];

cards.forEach(card=>{
const clone = card.cloneNode(true);
slider.appendChild(clone);
});

}

function startSlider(){

const slider = document.getElementById("preview-slider");

let speed = 0.35;

function animate(){

slider.scrollLeft += speed;

if(slider.scrollLeft >= slider.scrollWidth/2){
slider.scrollLeft = 0;
}

requestAnimationFrame(animate);

}

animate();

}

loadProducts();

</script>
