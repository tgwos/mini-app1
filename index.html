<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Gas Cloud</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

:root{
--red:#ff1a1a;
--dark:#050505;
--card:#111;
--gray:#9b9b9b;
}

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Segoe UI;

color:white;

background:black;

overflow-x:hidden;

}

/* SMOKE BACKGROUND */

.smoke{

position:fixed;
inset:0;

background:url("https://i.imgur.com/8QZ7Z3K.png");

background-size:cover;

opacity:.35;

mix-blend-mode:screen;

animation:smokeMove 60s linear infinite;

z-index:-3;

}

@keyframes smokeMove{

0%{transform:scale(1) translateY(0)}
50%{transform:scale(1.3) translateY(-40px)}
100%{transform:scale(1) translateY(0)}

}

/* RED ENERGY */

.energy{

position:fixed;

inset:-40%;

background:

radial-gradient(circle at 30% 30%,rgba(255,0,0,.35),transparent 40%),
radial-gradient(circle at 70% 60%,rgba(255,0,0,.2),transparent 40%);

filter:blur(140px);

animation:move 18s linear infinite;

z-index:-2;

}

@keyframes move{

0%{transform:translate(0,0)}
50%{transform:translate(-10%,5%)}
100%{transform:translate(0,0)}

}

/* PARTICLES */

canvas{

position:fixed;
inset:0;
z-index:-1;

}

/* HERO */

.hero{

text-align:center;

padding:40px 20px;

}

.hero img{

width:120px;
height:120px;

border-radius:50%;

box-shadow:

0 0 25px red,
0 0 70px rgba(255,0,0,.6);

}

.hero h1{

letter-spacing:4px;

margin:15px 0 5px;

font-size:30px;

text-shadow:

0 0 15px red,
0 0 40px red;

}

.hero p{

color:var(--gray);

}

/* SLIDER */

.slider{

display:flex;

gap:16px;

overflow:hidden;

padding:20px;

}

.slide{

min-width:170px;
height:170px;

border-radius:20px;

overflow:hidden;

border:1px solid rgba(255,0,0,.5);

box-shadow:

0 0 18px rgba(255,0,0,.5);

}

.slide img{

width:100%;
height:100%;

object-fit:cover;

}

/* PANEL */

.panel{

margin:0 18px 120px;

padding:24px;

border-radius:24px;

background:rgba(20,20,20,.7);

backdrop-filter:blur(14px);

border:1px solid rgba(255,0,0,.4);

box-shadow:

0 0 30px rgba(255,0,0,.35);

}

/* GRID */

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:18px;

}

/* CATALOG */

.catalog{

grid-column:1/-1;

display:flex;

align-items:center;

gap:18px;

padding:18px;

height:110px;

border-radius:20px;

background:#151515;

border:1px solid rgba(255,0,0,.4);

cursor:pointer;

transition:.35s;

}
  .catalog span{

font-size:17px;

font-weight:700;

letter-spacing:2px;

text-transform:uppercase;

color:white;

}

.catalog:hover{

transform:translateY(-6px);

box-shadow:

0 0 18px red,
0 0 40px rgba(255,0,0,.4);

}

.catalog img{

width:60px;
height:60px;

border-radius:50%;

}

/* SMALL CARDS */

.card{

height:110px;

display:flex;

flex-direction:column;

align-items:center;
justify-content:center;

border-radius:20px;

background:#141414;

border:1px solid rgba(255,0,0,.4);

cursor:pointer;

transition:.35s;

}

.card:hover{

transform:translateY(-8px);

box-shadow:

0 0 18px red,
0 0 40px rgba(255,0,0,.4);

}

.card img{

width:46px;
height:46px;

border-radius:50%;

margin-bottom:8px;

}

.card span{

font-size:11px;

font-weight:600;

letter-spacing:1.8px;

text-transform:uppercase;

color:#d0d0d0;

margin-top:4px;

text-align:center;

}

/* BOTTOM BAR */

.bottom{

position:fixed;

bottom:16px;
left:16px;
right:16px;

height:70px;

display:flex;
align-items:center;
justify-content:space-around;

border-radius:24px;

background:rgba(20,20,20,.85);

backdrop-filter:blur(14px);

border:1px solid rgba(255,0,0,.5);

box-shadow:

0 0 20px rgba(255,0,0,.4);

}

.bottom a{

display:flex;
flex-direction:column;
align-items:center;

gap:4px;

font-size:10px;

font-weight:600;

letter-spacing:1.4px;

text-transform:uppercase;

color:#ff1a1a;

text-decoration:none;

}

.bottom svg{
width:22px;
height:22px;
fill:#ff1a1a;
}

/* POPUP */

.popup{

position:fixed;
inset:0;

background:rgba(0,0,0,.7);

display:flex;
align-items:center;
justify-content:center;

opacity:0;
pointer-events:none;

transition:.25s;

}

.popup.show{

opacity:1;
pointer-events:auto;

}

.popup-box{

background:#181818;

padding:25px;

border-radius:20px;

border:1px solid rgba(255,0,0,.6);

box-shadow:

0 0 30px red;

text-align:center;

}

.popup-box a{

display:block;

margin-top:10px;

background:#222;

padding:12px;

border-radius:12px;

text-decoration:none;

color:white;

}
  .fixed-logo{

position:fixed;

top:14px;
left:50%;

transform:translateX(-50%);

z-index:999;

}

.fixed-logo img{

width:60px;
height:60px;

border-radius:50%;

box-shadow:

0 0 15px red,
0 0 40px rgba(255,0,0,.6);

}

</style>
</head>

<body>
<div class="smoke"></div>
<div class="energy"></div>

<canvas id="particles"></canvas>

<div class="hero">

<img src="https://tgwos.github.io/mini-app1/4985865506745158660.jpg">

<h1>GAS CLOUD</h1>

</div>

<div id="slider" class="slider"></div>

<div class="panel">

<div class="grid">

<div class="catalog" onclick="location.href='catalog.html'">

<img src="https://tgwos.github.io/mini-app1/4985865506745158660.jpg">

<span>CATALOGO</span>

</div>

<div class="card" onclick="openPopup('CONTACT','@GasCloud2','https://t.me/GasCloud2')">
<img src="https://tgwos.github.io/mini-app1/4985865506745158660.jpg">
<span>CONTACT</span>
</div>

<div class="card" onclick="openPopup('CHANNEL','GASCLOUDPRIVE','https://t.me/+iMgIPdF4HPswMDRh')">
<img src="https://tgwos.github.io/mini-app1/4985865506745158660.jpg">
<span>CHANNEL</span>
</div>

<div class="card" onclick="openPopup('CREATED BY','BOX CREATE','https://t.me/boxcreate22')">
<img src="https://tgwos.github.io/mini-app1/4985865506745158660.jpg">
<span>CREATOR</span>
</div>

<div class="card">
<img src="https://tgwos.github.io/mini-app1/4985865506745158660.jpg">
<span>NEWS</span>
</div>

</div>

</div>

<div id="popup" class="popup" onclick="closePopup()">

<div class="popup-box" onclick="event.stopPropagation()">

<h3 id="ptitle"></h3>

<a id="plink"></a>

</div>

</div>

<div class="bottom">

<a onclick="tg.openLink('https://t.me/GasCloud2')">
<svg viewBox="0 0 24 24">
<path d="M9.04 15.47l-.39 5.5c.56 0 .8-.24 1.08-.52l2.6-2.48 5.38 3.94c.99.55 1.69.26 1.94-.92l3.52-16.5c.33-1.52-.55-2.12-1.51-1.76L1.48 9.2c-1.46.57-1.44 1.38-.25 1.75l5.5 1.72L19.42 4.7c.6-.4 1.15-.18.7.22"/>
</svg>
<span>Telegram</span>
</a>

<a onclick="tg.openLink('https://instagram.com/gascloud11')">
<svg viewBox="0 0 24 24">
<path d="M7 2h10a5 5 0 015 5v10a5 5 0 01-5 5H7a5 5 0 01-5-5V7a5 5 0 015-5zm5 5.5A4.5 4.5 0 1016.5 12 4.5 4.5 0 0012 7.5zm6.5-.9a1.1 1.1 0 11-1.1-1.1 1.1 1.1 0 011.1 1.1z"/>
</svg>
<span>Instagram</span>
</a>

<a onclick="tg.openLink('https://signal.me')">
<svg viewBox="0 0 24 24">
<path d="M12 2a10 10 0 100 20 9.8 9.8 0 004.9-1.3l4.1 1.1-1.1-4.1A10 10 0 0012 2z"/>
</svg>
<span>Signal</span>
</a>

</div>

<script>

const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

/* POPUP */

function openPopup(title,text,url){

document.getElementById("ptitle").innerText=title;

let link=document.getElementById("plink");

link.innerText=text;

link.onclick=()=>tg.openLink(url);

document.getElementById("popup").classList.add("show");

}

function closePopup(){

document.getElementById("popup").classList.remove("show");

}

/* PRODUCTS */

async function load(){

let res=await fetch("products.json");

let data=await res.json();

let slider=document.getElementById("slider");

data.forEach(p=>{

let div=document.createElement("div");

div.className="slide";

div.innerHTML=`<img src="${p.previewImage}">`;

slider.appendChild(div);

});

duplicate();

scroll();

}

function duplicate(){

let slider=document.getElementById("slider");

[...slider.children].forEach(el=>{

slider.appendChild(el.cloneNode(true));

});

}

function scroll(){

let slider=document.getElementById("slider");

function anim(){

slider.scrollLeft+=0.4;

if(slider.scrollLeft>=slider.scrollWidth/2){

slider.scrollLeft=0;

}

requestAnimationFrame(anim);

}

anim();

}

load();

/* PARTICLES */

const canvas=document.getElementById("particles");

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
v:Math.random()*0.4+0.1

});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="rgba(255,0,0,.8)";

particles.forEach(p=>{

ctx.beginPath();

ctx.arc(p.x,p.y,p.r,0,Math.PI*2);

ctx.fill();

p.y-=p.v;

if(p.y<0)p.y=canvas.height;

});

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
